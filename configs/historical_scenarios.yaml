schema_version: '1.0'
section: Phase II Section 10
title: Historical stress-window identification
objective: Select historical liquidity-stress windows from the canonical Section 8
  long-form analytical datasets without forcing predetermined episodes into the final
  scenario sample.
input_files:
- data/processed/fed_liquidity_factors.parquet
- data/processed/treasury_market_factors.parquet
fr2004_raw_glob: data/raw/fr2004/fr2004_*.csv
methodology:
  tail_quantile: 0.95
  rolling_window_observations: 60
  minimum_available_components: 2
  require_all_series_groups: true
  merge_gap_days: 7
  pre_window_days: 3
  post_window_days: 3
  minimum_exceedance_days: 1
  maximum_windows: 12
  component_weights:
    sofr_spike_score: 1.0
    treasury_yield_shock_score: 1.0
    settlement_fail_score: 1.0
    financing_disruption_score: 1.0
    reserve_contraction_score: 1.0
series_rules:
  sofr:
    source_names:
    - SOFR
    alignment_frequency: daily
    standardized_units:
    - PERCENT
    - BASIS_POINTS
    metric_kinds:
    - rate
    include_patterns:
    - sofr
    exclude_patterns:
    - volume
    - percentile
    - 25th
    - 75th
    - 99th
    exact_series_ids: []
  treasury_yields:
    source_names:
    - H15
    alignment_frequency: daily
    standardized_units:
    - PERCENT
    - BASIS_POINTS
    require_maturity: true
    include_patterns: []
    exclude_patterns:
    - spread
    - change
    exact_series_ids: []
  settlement_fails:
    source_names:
    - FR2004
    alignment_frequency: weekly
    standardized_units:
    - USD
    include_patterns:
    - fail
    - pdft[rd][_-]
    exclude_patterns:
    - ratio
    - percent
    - pdft[rd][_-][a-z0-9_-]*c(?:\s|$)
    exact_series_ids: []
  financing_volume:
    source_names:
    - FR2004
    - SOFR
    alignment_frequency: weekly
    standardized_units:
    - USD
    include_patterns:
    - repo
    - financ
    - securities[ _-]+in
    - securities[ _-]+out
    - volume
    - pds(?:ora|irra|iosb|oos)[_-]
    exclude_patterns:
    - fail
    - position
    - holding
    - inventory
    - pds(?:ora|irra|iosb|oos)[_-][a-z0-9_-]*c(?:\s|$)
    exact_series_ids: []
  reserve_balances:
    source_names:
    - H41
    alignment_frequency: daily
    standardized_units:
    - USD
    include_patterns:
    - reserve.*balance
    - balances.*depository
    - wresbal
    exclude_patterns:
    - requirement
    - ratio
    - change
    exact_series_ids:
    - WRESBAL
candidate_anchors:
- id: financial_crisis_2007_2009
  name: 2007-2009 financial crisis
  start_date: '2007-07-01'
  end_date: '2009-06-30'
  treatment: Label only if an empirically selected window overlaps this range.
- id: september_2019_repo_stress
  name: September 2019 repo-market stress
  start_date: '2019-09-01'
  end_date: '2019-10-15'
  treatment: Label only if an empirically selected window overlaps this range.
- id: march_2020_treasury_stress
  name: March 2020 Treasury-market stress
  start_date: '2020-03-01'
  end_date: '2020-04-30'
  treatment: Label only if an empirically selected window overlaps this range.
