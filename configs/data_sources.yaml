schema_version: "1.0"
catalog_name: "FICC Treasury Clearing Liquidity Stress Testing - Official Federal Reserve Data Catalog"
catalog_as_of_date: "2026-07-19"
branch: "feature/02-fed-data-catalog"
owner: "Model Validation and Data Governance"
intended_use: "Controlled official-source inputs for historical calibration, hypothetical liquidity stress design, benchmarking, sensitivity analysis, and independent model validation."
value_taxonomy:
  observed: "Directly published official values retained without economic transformation."
  derived: "Deterministic calculations from observed values; must record formula and lineage."
  synthetic: "Generated data used only where public aggregates cannot support member-level analysis."
  assumed: "Expert or policy assumptions; must not be represented as observed Federal Reserve data."
  modeled: "Outputs produced by the liquidity stress-testing model."
control_requirements:
  - "Use HTTPS official-source endpoints only."
  - "Record retrieval timestamp in UTC."
  - "Retain the original raw payload and a SHA-256 checksum."
  - "Record source publication date, observation date, and revision indicator where available."
  - "Do not overwrite a source vintage used by a completed model run."
  - "Apply reporting-regime mappings before combining FR 2004 history."
  - "Separate observed, derived, synthetic, assumed, and modeled values."
  - "Document all imputations; do not forward-fill across unverified publication gaps."
sources:
  - source_id: "nyfed_fr2004"
    source_name: "FR 2004 Primary Dealer Statistics"
    publisher: "Federal Reserve Bank of New York"
    official_source_url: "https://www.newyorkfed.org/markets/counterparties/primary-dealers-statistics"
    machine_access_url: "https://markets.newyorkfed.org/api/pd/get/all/timeseries.csv"
    publication_calendar: "Weekly; updated Thursday at approximately 4:15 p.m. ET with the previous reporting week's statistics."
    available_history: "Primary Dealer Statistics are available from 1998-01-28 to present and are segmented by reporting regime. Treasury settlement-fails history extends to July 1990."
    revision_policy: "Historical reporting changes, corrections, and regime changes may alter labels or series coverage. Ingestion must retain the source file, retrieval timestamp, content hash, reporting-regime identifier, and the official time-series list used."
    source_contract_note: "FR 2004 is aggregate primary-dealer information. It does not identify individual dealers, FICC members, or FICC-specific obligations."
  - source_id: "nyfed_sofr"
    source_name: "New York Fed SOFR"
    publisher: "Federal Reserve Bank of New York"
    official_source_url: "https://www.newyorkfed.org/markets/reference-rates/sofr"
    machine_access_url: "https://markets.newyorkfed.org/api/rates/secured/sofr/search.json"
    publication_calendar: "Each U.S. government-securities business day at approximately 8:00 a.m. ET, normally reflecting the prior business day's transactions."
    available_history: "SOFR value date history begins 2018-04-02; first publication was 2018-04-03."
    revision_policy: "A same-day revision may be published at approximately 2:30 p.m. ET when revised inputs or a calculation error changes the rate by more than one basis point. Prior-day revisions are generally not made except in extraordinary circumstances."
    source_contract_note: "SOFR is a broad Treasury-repo benchmark. It includes FICC-cleared DVP activity but is not a direct measure of FICC participant liquidity needs."
  - source_id: "frb_h15"
    source_name: "Federal Reserve H.15 Selected Interest Rates"
    publisher: "Board of Governors of the Federal Reserve System"
    official_source_url: "https://www.federalreserve.gov/releases/h15/"
    machine_access_url: "https://www.federalreserve.gov/datadownload/Choose.aspx?rel=H15"
    publication_calendar: "Daily Monday through Friday at 4:15 p.m. ET; not posted on holidays or when the Board is closed."
    available_history: "History varies by maturity. Long-tenor nominal constant-maturity series generally begin in 1962; bill and newer maturity series begin later."
    revision_policy: "Observations may be corrected or revised by the Board. The pipeline must preserve retrieval vintages and must not silently overwrite a previously used model-input vintage."
    source_contract_note: "Treasury constant-maturity yields are interpolated par yields, not transaction prices or directly observed executable dealer quotes."
  - source_id: "frb_h41"
    source_name: "Federal Reserve H.4.1 Factors Affecting Reserve Balances"
    publisher: "Board of Governors of the Federal Reserve System"
    official_source_url: "https://www.federalreserve.gov/releases/h41/"
    machine_access_url: "https://www.federalreserve.gov/datadownload/Choose.aspx?rel=H41"
    publication_calendar: "Weekly each Thursday, generally at 4:30 p.m. ET. Publication may shift to the next business day when the regular date is a federal holiday."
    available_history: "Selected current-format FRED/DDP series used here begin 2002-12-18; older historical tables exist for some H.4.1 concepts."
    revision_policy: "Corrections, reclassifications, new facilities, discontinued facilities, and table changes are announced by the Board. Preserve source vintages and monitor announcements."
    source_contract_note: "H.4.1 is systemwide Federal Reserve balance-sheet information. It is not a direct measurement of FICC liquidity resources or participant-level funding capacity."
series:
