    source_id: "nyfed_fr2004"
    release_name: "FR 2004 Primary Dealer Statistics"
    series_identifier: "FR 2004A/B/C; Treasury net-position API code resolved from /api/pd/list/timeseries.csv"
    definition: "Aggregate net positions of primary dealers in U.S. Treasury securities for the applicable maturity or reporting bucket."
    unit: "USD millions"
    frequency: "Weekly, as of reporting date"
    publication_calendar: "Weekly; Thursday approximately 4:15 p.m. ET, reporting the previous week's statistics."
    available_history: "1998-01-28 to present; segmented when FR 2004 reporting structure changes."
    revision_policy: "Retain immutable raw snapshots and SHA-256 hashes. Resolve the official NY Fed API code from the time-series-list endpoint for the applicable reporting regime; do not splice regime segments without an explicit mapping."
    intended_model_use: "Dealer-inventory state variable; proxy for intermediation capacity and inventory liquidation pressure."
    known_limitations: "Aggregate primary-dealer data; no dealer identities, no FICC-member mapping, structural breaks across reporting regimes, and no direct CCP liquidity obligation."
    official_source_url: "https://www.newyorkfed.org/markets/counterparties/primary-dealers-statistics"
