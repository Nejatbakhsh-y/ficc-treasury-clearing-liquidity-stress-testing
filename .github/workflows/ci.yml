name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python 3.11 quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and development tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Ruff formatting
        run: python -m ruff format --check .

      - name: Ruff linting
        run: python -m ruff check .

      - name: Mypy type checking
        run: python -m mypy src tests

      - name: Pytest and coverage
        run: python -m pytest

      - name: CLI smoke test
        run: ficc-liquidity --config configs/project.yaml doctor
      - name: Initialize DuckDB analytical database
        run: python -m ficc_liquidity --config configs/project.yaml init-db
      - name: CLI environment doctor
        run: python -m ficc_liquidity --config configs/project.yaml doctor
